<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>raylib web game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    canvas {
      display: block;
      border: 0;
      background: black;
    }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <pre id="output"></pre>

  <script>
    var Module = {
      print: (function() {
        const element = document.getElementById('output');
        return function(text) {
          console.log(text);
          if (element) element.textContent += text + "\n";
        };
      })(),
      canvas: document.getElementById('canvas')
    };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
